<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World — Oktomatzo Host</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#000;--bg-surface:#060608;--bg-elevated:#0d0d12;--bg-card:rgba(255,255,255,0.025);--bg-hover:rgba(255,255,255,0.05);--text:#eee;--text-secondary:#8a8a9a;--text-muted:#5a5a6a;--accent:#3b82f6;--accent-hover:#60a5fa;--accent-subtle:rgba(59,130,246,0.08);--success:#10b981;--danger:#ef4444;--border:rgba(255,255,255,0.06);--border-active:rgba(59,130,246,0.3);--radius:10px;--radius-lg:16px;--shadow:0 2px 20px rgba(0,0,0,.5);--font:'Space Grotesk','Inter',-apple-system,sans-serif}
    html{-webkit-font-smoothing:antialiased}
    body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;line-height:1.6}
    a{color:inherit;text-decoration:none}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 26px;border-radius:8px;font-size:.88rem;font-weight:500;font-family:var(--font);transition:all .2s;cursor:pointer;border:1px solid transparent;outline:none;white-space:nowrap}
    .btn:active{transform:scale(.97)}
    .btn-primary{background:var(--accent);color:#fff}
    .btn-primary:hover{background:var(--accent-hover);color:#fff;box-shadow:0 0 30px rgba(59,130,246,.2)}
    .btn-outline{background:transparent;color:var(--text-secondary);border-color:var(--border)}
    .btn-outline:hover{border-color:rgba(255,255,255,.15);color:var(--text);background:var(--bg-card)}
    body{background:#000;min-height:100vh;display:flex;flex-direction:column}
    .standalone-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px}
    .project-root{min-height:250px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
  </style>
</head>
<body>
  <div class="standalone-wrap">
    <div id="project-root" class="project-root">
      <p style="color:var(--text-muted);">Loading...</p>
    </div>
  </div>
  <script src="main.js"></script>
</body>
</html>
